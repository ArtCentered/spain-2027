<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Spain 2027 — Day-by-Day Map · Mar i Muntanya — Pre-planning options</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{ --teal:#1F4E5F; --teal2:#2C7A8C; --terra:#C1660F; --sand:#FBF6EE;
    --ink:#243239; --muted:#6b7a80; --hike:#2E7D32; }
  *{box-sizing:border-box;}
  button{-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);}
  #app{display:flex;flex-direction:column;height:100vh;}
  header{background:var(--teal);color:#fff;padding:13px 20px;flex:0 0 auto;}
  header h1{margin:0;font-size:18px;letter-spacing:.2px;}
  header p{margin:3px 0 0;font-size:12.5px;opacity:.85;}
  #main{flex:1 1 auto;min-height:0;position:relative;}
  #map{position:absolute;inset:0;}

  /* ===== Itinerary switcher ===== */
  .switch{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
  .switch button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.32);
    border-radius:999px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
  .switch button:hover{background:rgba(255,255,255,.26);}
  .switch button.active{background:#fff;color:var(--teal);border-color:#fff;}
  .switch button::before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  .switch button[data-key="andalucia"]::before{background:#C1660F;}
  .switch button[data-key="castile"]::before{background:#7A5AA8;}
  .switch button[data-key="north"]::before{background:#1F8A70;}
  .switch button[data-key="mallorca"]::before{background:#1565C0;}
  .switch button.ovbtn{background:rgba(255,255,255,.10);border-style:dashed;}
  .switch button.ovbtn::before{display:none;}

  /* ===== Trip overview panel (opens over the map) ===== */
  .overlay{position:fixed;inset:0;z-index:1200;background:rgba(18,35,42,.55);
    display:flex;align-items:center;justify-content:center;padding:20px;
    opacity:0;pointer-events:none;transition:opacity .25s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .ovcard{position:relative;width:460px;max-width:100%;max-height:88%;overflow-y:auto;background:#fff;
    border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);padding:0 22px 20px;-webkit-overflow-scrolling:touch;}
  .ov-accent{height:7px;margin:0 -22px 16px;border-radius:16px 16px 0 0;}
  .ovx{position:absolute;top:13px;right:13px;width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(0,0,0,.08);color:#333;font-size:16px;cursor:pointer;line-height:1;}
  .ovx:hover{background:rgba(0,0,0,.16);}
  .ov-title{margin:2px 38px 7px 0;font-size:21px;color:var(--teal);line-height:1.2;}
  .ov-blurb{font-size:13.5px;line-height:1.55;color:var(--ink);margin:0 0 6px;}
  .ov-row{display:flex;gap:11px;padding:11px 0;border-top:1px solid #f0e9dc;}
  .ov-row .ov-ic{font-size:19px;flex:0 0 auto;line-height:1.3;}
  .ov-row .ov-tx{font-size:13px;line-height:1.5;color:var(--ink);}
  .ov-row .ov-tx b{display:block;color:var(--teal);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
  .ov-special{margin-top:14px;background:#fbf8f2;border:1px solid #ece2d2;border-radius:12px;padding:11px 14px;}
  .ov-sp-h{font-weight:700;font-size:13px;margin-bottom:6px;}
  .ov-special ul{margin:0;padding-left:18px;}
  .ov-special li{font-size:13px;line-height:1.5;margin-bottom:4px;color:var(--ink);}
  .ov-allbtn{display:block;width:100%;margin-top:14px;padding:12px;border:none;border-radius:11px;
    color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;letter-spacing:.2px;}
  .ov-allbtn:hover{filter:brightness(1.08);}
  .ov-nophotos{margin-top:14px;padding:11px;border-radius:11px;background:#f3eee4;color:var(--muted);
    font-size:12.5px;font-weight:600;text-align:center;}

  .pin{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;
    box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #fff;cursor:pointer;transition:transform .15s, opacity .25s;}
  .pin:hover{transform:scale(1.12);}
  .pin.city{width:34px;height:34px;border-radius:50%;background:var(--teal);font-size:14px;}
  .pin.hike{width:32px;height:32px;border-radius:9px;background:var(--hike);font-size:16px;}
  .pin.dim{opacity:.45;}
  .pin.dim:hover{opacity:.92;}
  .pin.sel{outline:3px solid #ffce3a;outline-offset:1px;box-shadow:0 2px 10px rgba(0,0,0,.55);}

  /* ===== Readable floating day card — shares the screen with the map ===== */
  #daycard{position:absolute;left:18px;bottom:18px;z-index:1000;width:350px;max-width:calc(100% - 36px);
    max-height:calc(100% - 36px);background:#fff;border-radius:14px;overflow:hidden;
    box-shadow:0 16px 44px rgba(0,0,0,.34);display:flex;flex-direction:column;
    opacity:0;transform:translateY(14px);pointer-events:none;transition:opacity .3s ease, transform .3s ease;}
  #daycard.show{opacity:1;transform:translateY(0);pointer-events:auto;}
  .card-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}

  .gal{position:relative;width:100%;height:235px;background:#13232a;}
  .gal img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s;pointer-events:none;}
  .gal img.active{opacity:1;pointer-events:auto;cursor:zoom-in;}
  .gexpand{position:absolute;bottom:8px;right:8px;z-index:3;background:rgba(0,0,0,.5);color:#fff;
    border-radius:7px;font-size:12.5px;padding:4px 8px;cursor:zoom-in;display:flex;align-items:center;gap:4px;}
  .gexpand:hover{background:rgba(0,0,0,.72);}

  /* ===== Fullscreen photo lightbox ===== */
  .lightbox{position:fixed;inset:0;z-index:1400;background:rgba(8,12,15,.93);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .2s;}
  .lightbox.show{opacity:1;pointer-events:auto;}
  .lb-img{max-width:92vw;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 12px 50px rgba(0,0,0,.6);}
  .lb-cap{color:#fff;margin-top:15px;font-size:15.5px;text-align:center;max-width:90vw;padding:0 14px;line-height:1.35;}
  .lb-cap .lb-count{display:block;font-size:12px;color:rgba(255,255,255,.55);margin-top:5px;letter-spacing:.5px;}
  .lb-x{position:absolute;top:16px;right:18px;width:44px;height:44px;border-radius:50%;border:none;
    background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;}
  .lb-x:hover{background:rgba(255,255,255,.28);}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;border:none;
    background:rgba(255,255,255,.15);color:#fff;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .lb-nav:hover{background:rgba(255,255,255,.3);}
  .lb-nav.prev{left:16px;} .lb-nav.next{right:16px;}
  /* Designed placeholder when a day has no photo yet */
  .gal.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 70%,var(--terra) 140%);color:#fff;text-align:center;padding:18px;}
  .gal.hero .hicon{font-size:56px;line-height:1;margin-bottom:10px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));}
  .gal.hero .hname{font-size:21px;font-weight:700;letter-spacing:.3px;}
  .gal.hero .hsub{font-size:12.5px;opacity:.85;margin-top:5px;max-width:280px;}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.42);color:#fff;border:none;
    width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .gnav.prev{left:8px;} .gnav.next{right:8px;}
  .gnav:hover{background:rgba(0,0,0,.65);}
  .gdots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:5px;justify-content:center;}
  .gdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);box-shadow:0 0 2px rgba(0,0,0,.4);}
  .gdot.active{background:#fff;}
  .xbtn{position:absolute;top:9px;right:9px;z-index:3;background:rgba(0,0,0,.5);color:#fff;border:none;
    width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;line-height:1;}
  .xbtn:hover{background:rgba(0,0,0,.75);}

  .card-body{padding:14px 18px 8px;}
  .card-body .pd{font-size:11px;color:var(--terra);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .card-body h2{margin:3px 0 1px;font-size:19px;color:var(--teal);line-height:1.15;}
  .card-body .loc{font-size:12.5px;color:var(--muted);margin-bottom:8px;}
  .acts{list-style:none;margin:8px 0 0;padding:0;}
  .acts li{position:relative;padding:7px 0 7px 25px;font-size:13px;line-height:1.45;border-top:1px solid #f0e9dc;color:var(--ink);}
  .acts li:first-child{border-top:none;}
  .acts li .ic{position:absolute;left:0;top:6px;font-size:13.5px;}
  .tag{display:inline-block;background:#eef3f4;color:var(--teal);font-size:11px;font-weight:600;border-radius:5px;padding:3px 9px;margin:10px 0 4px;}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;
    border-top:1px solid #ece2d2;background:#fbf8f2;flex:0 0 auto;}
  .navbtn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .navbtn:hover{background:#163b48;}
  .navbtn:disabled{background:#cdd6d9;cursor:default;}
  .foot-count{font-size:12.5px;color:var(--muted);font-weight:700;}

  .hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:900;background:rgba(31,78,95,.92);color:#fff;
    font-size:12.5px;padding:7px 14px;border-radius:20px;box-shadow:0 3px 10px rgba(0,0,0,.2);transition:opacity .4s;}
  @media(max-width:720px){
    header{padding:10px 15px;} header h1{font-size:15.5px;} header p{font-size:11px;}
    .switch button{padding:6px 12px;font-size:12.5px;}
    #daycard{left:8px;right:8px;bottom:8px;width:auto;max-width:none;max-height:80%;}
    .gal{height:200px;}
    .gnav{width:40px;height:40px;font-size:21px;}
    .xbtn{width:38px;height:38px;font-size:18px;}
    .navbtn{padding:12px 16px;font-size:13.5px;}
    .gdot{width:7px;height:7px;}
    .hint{font-size:11.5px;top:9px;}
    .overlay{padding:12px;} .ovcard{max-height:92%;}
    .lb-img{max-height:72vh;} .lb-nav{width:46px;height:46px;font-size:25px;} .lb-nav.prev{left:8px;} .lb-nav.next{right:8px;}
    .lb-cap{font-size:14px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="index.html" style="display:inline-block;color:#cfe0e4;text-decoration:none;font-size:12.5px;font-weight:600;margin-bottom:5px;">← Back to Mar i Muntanya (the trip)</a>
    <h1 id="trip-title">🇪🇸 Spain 2027 — Day by Day</h1>
    <p id="trip-sub"></p>
    <div class="switch">
      <button class="active" data-key="andalucia" onclick="loadItinerary('andalucia')">🌅 Andalucía · South</button>
      <button data-key="castile" onclick="loadItinerary('castile')">🏰 Castile · Center</button>
      <button data-key="north" onclick="loadItinerary('north')">⛰️ Green Spain · North</button>
      <button data-key="mallorca" onclick="loadItinerary('mallorca')">🏝️ Mallorca · Islands</button>
      <button class="ovbtn" onclick="openOverview()">ℹ️ Overview</button>
    </div>
  </header>
  <div id="main">
    <div id="map"></div>
    <div class="hint" id="hint">👆 All three trips are on the map — tap any pin to jump into that trip</div>
    <!-- Floating readable day card -->
    <div id="daycard">
      <div class="card-scroll">
        <div id="cardGal"></div>
        <div class="card-body" id="cardBody"></div>
      </div>
      <div class="card-foot">
        <button class="navbtn" id="prevBtn" onclick="step(-1)">‹ Prev</button>
        <span class="foot-count" id="footCount"></span>
        <button class="navbtn" id="nextBtn" onclick="step(1)">Next ›</button>
      </div>
    </div>
  </div>
</div>

<!-- Fullscreen photo lightbox -->
<div id="lightbox" class="lightbox" onclick="lbBackdrop(event)">
  <button class="lb-x" onclick="closeLightbox()">✕</button>
  <button class="lb-nav prev" onclick="lbStep(-1)">‹</button>
  <img class="lb-img" id="lbImg" src="" alt="">
  <button class="lb-nav next" onclick="lbStep(1)">›</button>
  <div class="lb-cap" id="lbCap"></div>
</div>

<!-- Trip overview panel (opens over the map) -->
<div id="overlay" class="overlay" onclick="closeOverview(event)">
  <div class="ovcard" onclick="event.stopPropagation()">
    <button class="ovx" onclick="closeOverview()">✕</button>
    <div id="ovContent"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

/* ============================ gallery / card ============================ */
function galShift(btn, dir){
  const gal = btn.closest('.gal');
  const imgs = [...gal.querySelectorAll('img')];
  const dots = [...gal.querySelectorAll('.gdot')];
  let i = imgs.findIndex(x=>x.classList.contains('active'));
  imgs[i].classList.remove('active'); if(dots[i]) dots[i].classList.remove('active');
  i = (i + dir + imgs.length) % imgs.length;
  imgs[i].classList.add('active'); if(dots[i]) dots[i].classList.add('active');
}
// Photo gallery when the day has imgs; otherwise a designed gradient hero card.
function galleryHTML(imgs, day, stop){
  if(!imgs.length){
    return `<div class="gal hero"><button class="xbtn" onclick="closeCard()">✕</button>
      <div class="hicon">${day.hero||'📍'}</div>
      <div class="hname">${stop.name}</div>
      <div class="hsub">Day ${day.d} · ${day.title}</div></div>`;
  }
  const multi = imgs.length>1;
  const imgEls = imgs.map((src,j)=>`<img class="${j===0?'active':''}" src="${src}" alt="" loading="lazy" onerror="this.remove()" onclick="openLightbox()">`).join('');
  const dots = multi ? `<div class="gdots">${imgs.map((_,j)=>`<span class="gdot ${j===0?'active':''}"></span>`).join('')}</div>` : '';
  const nav = multi ? `<button class="gnav prev" onclick="galShift(this,-1)">‹</button><button class="gnav next" onclick="galShift(this,1)">›</button>` : '';
  const expand = `<span class="gexpand" onclick="openLightbox()" title="View larger">⤢ Enlarge</span>`;
  return `<div class="gal"><button class="xbtn" onclick="closeCard()">✕</button>${imgEls}${nav}${expand}${dots}</div>`;
}

/* ============================ map ============================ */
const mapTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:18 });
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
  attribution:'Imagery &copy; Esri', maxZoom:18 });
const satLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{ maxZoom:18 });
const satellite = L.layerGroup([sat, satLabels]);

const map = L.map('map',{scrollWheelZoom:true, layers:[mapTiles]});
L.control.layers({"🗺️ Map":mapTiles, "🛰️ Satellite":satellite},null,{position:'topright'}).addTo(map);

// All three trips live on the map at once, colour-coded. The active trip is
// highlighted; the others stay faded but fully clickable.
const TRIP_ORDER = ['andalucia','castile','north','mallorca'];
const TRIP_COLORS = { andalucia:'#C1660F', castile:'#7A5AA8', north:'#1F8A70', mallorca:'#1565C0' };
const layers = {};
let activeKey = null, current = 0, curImgs = [], lbIdx = 0;
const card = document.getElementById('daycard');
const hint = document.getElementById('hint');

// Flat, day-ordered photo list per trip — powers "browse all photos" in the lightbox.
const TRIP_PHOTOS = {};
function buildTripPhotos(){
  TRIP_ORDER.forEach(key=>{
    const list = [];
    itineraries[key].days.forEach(day=>{
      ((PHOTOS[key] && PHOTOS[key][day.d]) || []).forEach(src=> list.push({src, d:day.d, title:day.title}));
    });
    TRIP_PHOTOS[key] = list;
  });
}

function renderAll(){
  TRIP_ORDER.forEach(key=>{
    const it = itineraries[key], color = TRIP_COLORS[key];
    const polys = [], mks = [];
    it.routes.forEach(r=>{
      const style = r.type==='train'
        ? {color, weight:4, opacity:.9}
        : {color, weight:3, opacity:.9, dashArray:'5,8'};
      const pl = L.polyline(r.pts, style).addTo(map);
      pl._kind = r.type;
      pl.on('click', ()=> loadItinerary(key));
      polys.push(pl);
    });
    it.stops.forEach((s, si)=>{
      const icon = L.divIcon({className:'', html:`<div class="pin ${s.type}" data-key="${key}" data-si="${si}" style="background:${color}">${s.label}</div>`,
        iconSize:s.type==='city'?[34,34]:[32,32], iconAnchor:s.type==='city'?[17,17]:[16,16]});
      const m = L.marker(s.ll,{icon}).addTo(map);
      const firstDay = it.days.findIndex(d=>d.stop===si);
      m.on('click', ()=>{ if(activeKey!==key) setActive(key, false); openDay(firstDay>=0?firstDay:0); });
      mks.push(m);
    });
    layers[key] = {polys, markers:mks};
  });
}

// Highlight one trip, fade the rest. fit=true reframes the map to that trip.
function setActive(key, fit){
  activeKey = key;
  const it = itineraries[key];
  document.querySelectorAll('.switch button').forEach(b=>b.classList.toggle('active', b.dataset.key===key));
  document.getElementById('trip-title').textContent = it.title;
  document.getElementById('trip-sub').textContent = it.sub;
  TRIP_ORDER.forEach(k=>{
    const on = (k===key);
    layers[k].polys.forEach(pl=>{
      const train = pl._kind==='train';
      pl.setStyle({ opacity: on?0.95:0.25, weight: train?(on?4:2.5):(on?3:2) });
      if(on && pl._path && pl._path.parentNode) pl.bringToFront();
    });
    layers[k].markers.forEach(m=>{
      const el = m.getElement(); if(el){ const pin = el.querySelector('.pin'); if(pin) pin.classList.toggle('dim', !on); }
      m.setZIndexOffset(on?1000:0);
    });
  });
  if(fit) map.fitBounds(L.latLngBounds(it.stops.map(s=>s.ll)).pad(0.18));
}

// Header buttons: focus a trip and jump to its start.
function loadItinerary(key){
  setActive(key, true);
  openDay(0, false);
}

function markSelected(si){
  document.querySelectorAll('.pin').forEach(p=>p.classList.toggle('sel', p.dataset.key===activeKey && +p.dataset.si===si));
}
function openDay(i, fly){
  if(fly===undefined) fly = true;
  const it = itineraries[activeKey];
  current = i;
  const day = it.days[i], s = it.stops[day.stop];
  const imgs = (PHOTOS[activeKey] && PHOTOS[activeKey][day.d]) || day.imgs || [];
  curImgs = imgs;
  document.getElementById('cardGal').innerHTML = galleryHTML(imgs, day, s);
  document.getElementById('cardBody').innerHTML = `
    <div class="pd">Day ${day.d} · ${day.date}</div>
    <h2>${day.title}</h2><div class="loc">📍 ${s.name}</div>
    <ul class="acts">${day.acts.map(a=>`<li><span class="ic">${a[0]}</span>${a[1]}</li>`).join('')}</ul>
    <span class="tag">${day.tag}</span>`;
  document.getElementById('footCount').textContent = `Day ${day.d} of ${it.days.length}`;
  document.getElementById('prevBtn').disabled = (i===0);
  document.getElementById('nextBtn').disabled = (i===it.days.length-1);
  document.querySelector('.card-scroll').scrollTop = 0;
  card.classList.add('show');
  if(hint) hint.style.opacity = 0;
  markSelected(day.stop);
  if(fly) map.flyTo(s.ll, s.type==='city'?11:12, {duration:.7});
}
function step(dir){ const it=itineraries[activeKey]; const n=current+dir; if(n>=0 && n<it.days.length) openDay(n); }
function closeCard(){ card.classList.remove('show'); markSelected(-1); }

// Trip overview panel
function openOverview(){
  const o = OVERVIEW[activeKey], it = itineraries[activeKey], color = TRIP_COLORS[activeKey];
  const row = (ic,label,txt)=>`<div class="ov-row"><span class="ov-ic">${ic}</span><div class="ov-tx"><b>${label}</b>${txt}</div></div>`;
  document.getElementById('ovContent').innerHTML =
    `<div class="ov-accent" style="background:${color}"></div>`+
    `<h2 class="ov-title">${it.title.replace('🇪🇸 Spain 2027 — ','')}</h2>`+
    `<p class="ov-blurb">${o.blurb}</p>`+
    row('🌡️','Temperatures',o.temp)+
    row('🥾',"What you'll do &amp; see",o.doSee)+
    row('🚆','Getting around',o.travel)+
    row('📏','Distances',o.distance)+
    `<div class="ov-special"><div class="ov-sp-h" style="color:${color}">✨ What makes it special</div>`+
    `<ul>${o.unique.map(u=>`<li>${u}</li>`).join('')}</ul></div>`+
    ((TRIP_PHOTOS[activeKey]||[]).length
      ? `<button class="ov-allbtn" style="background:${color}" onclick="openAllPhotos()">📷 Browse all ${TRIP_PHOTOS[activeKey].length} photos</button>`
      : `<div class="ov-nophotos">📷 Photos coming soon</div>`);
  document.getElementById('overlay').classList.add('show');
}
function closeOverview(){ document.getElementById('overlay').classList.remove('show'); }

// Fullscreen photo lightbox — spans the WHOLE active trip's photos so you can
// flip through all of them in one go; opens at whichever photo you clicked.
function activeGalIndex(){
  const imgs = [...document.querySelectorAll('#cardGal img')];
  const i = imgs.findIndex(x=>x.classList.contains('active'));
  return i<0 ? 0 : i;
}
function renderLb(){
  const list = TRIP_PHOTOS[activeKey] || [];
  const item = list[lbIdx]; if(!item) return;
  document.getElementById('lbImg').src = item.src;
  const cap = CAPTIONS[item.src] || '';
  document.getElementById('lbCap').innerHTML = `Day ${item.d} · ${cap}<span class="lb-count">${lbIdx+1} / ${list.length}</span>`;
}
function openLightbox(){
  const list = TRIP_PHOTOS[activeKey] || [];
  if(!list.length) return;
  const clicked = curImgs[activeGalIndex()];
  const gi = list.findIndex(p=>p.src===clicked);
  lbIdx = gi<0 ? 0 : gi;
  renderLb();
  document.getElementById('lightbox').classList.add('show');
}
function openAllPhotos(){
  const list = TRIP_PHOTOS[activeKey] || [];
  if(!list.length) return;
  closeOverview();
  lbIdx = 0; renderLb();
  document.getElementById('lightbox').classList.add('show');
}
function lbStep(d){ const n=(TRIP_PHOTOS[activeKey]||[]).length; if(!n) return; lbIdx=(lbIdx+d+n)%n; renderLb(); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }
function lbBackdrop(e){ if(e.target.id==='lightbox') closeLightbox(); }

document.addEventListener('keydown', e=>{
  const lb = document.getElementById('lightbox');
  if(lb.classList.contains('show')){
    if(e.key==='ArrowRight') lbStep(1);
    else if(e.key==='ArrowLeft') lbStep(-1);
    else if(e.key==='Escape') closeLightbox();
    return;
  }
  if(e.key==='Escape' && document.getElementById('overlay').classList.contains('show')){ closeOverview(); return; }
  if(!card.classList.contains('show')) return;
  if(e.key==='ArrowRight') step(1);
  else if(e.key==='ArrowLeft') step(-1);
  else if(e.key==='Escape') closeCard();
});

// Draw all three trips, then open with an overview of the whole of Spain and
// the Andalucía proposal active. Buttons/pins take it from there.
function frameAll(){ const p = TRIP_ORDER.flatMap(k=>itineraries[k].stops.map(s=>s.ll)); map.fitBounds(L.latLngBounds(p).pad(0.08)); }
buildTripPhotos();
renderAll();
setActive('andalucia', false);
openDay(0, false);
frameAll();
// Layout/preview safety: once the map truly has its size, re-apply highlight + reframe.
setTimeout(()=>{ map.invalidateSize(); setActive(activeKey, false); openDay(current, false); frameAll(); }, 240);
setTimeout(()=>{ if(hint) hint.style.display='none'; }, 6000);
</script>
