<style>
  :root{ --teal:#1F4E5F; --teal2:#2C7A8C; --terra:#C1660F; --sea:#2C7A8C; --gold:#C8902F;
    --sand:#FBF6EE; --ink:#243239; --muted:#6b7a80; --hike:#2E7D32; --line:#ece3d4;
    --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px); }
  *{box-sizing:border-box;}
  button{-webkit-tap-highlight-color:transparent;font-family:inherit;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#f4f1ea;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ---------- top bar ---------- */
  .topbar{background:var(--teal);color:#fff;padding:calc(8px + var(--safe-t)) 16px 9px;flex:0 0 auto;
    display:flex;align-items:center;gap:9px;box-shadow:0 1px 0 rgba(0,0,0,.1);}
  .topbar .brand{font-size:16px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:6px;}
  .topbar .ctx{margin-left:auto;font-size:11.5px;opacity:.82;text-align:right;line-height:1.25;}
  .topbar .back{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:8px;font-size:13px;
    padding:6px 10px;cursor:pointer;display:none;}
  .topbar.has-back .back{display:inline-block;}
  .topbar.has-back .ctx{display:none;}
  .topbar .brand{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ---------- main scroll area ---------- */
  #views{flex:1 1 auto;min-height:0;position:relative;overflow:hidden;}
  .view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
  .view.active{display:block;}
  #view-map{overflow:hidden;}
  .scrollpad{padding:14px 14px calc(20px + var(--safe-b));}

  /* ---------- bottom tab bar ---------- */
  .tabbar{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid var(--line);
    padding-bottom:var(--safe-b);box-shadow:0 -2px 12px rgba(0,0,0,.06);}
  .tabbar button{flex:1;background:none;border:none;padding:8px 0 7px;cursor:pointer;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;font-weight:600;}
  .tabbar button .ti{font-size:21px;line-height:1;}
  .tabbar button.active{color:var(--teal);}

  /* ---------- day list (Itinerary) ---------- */
  .listhead{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin:2px 2px 10px;}
  .dayrow{display:flex;gap:12px;align-items:center;background:#fff;border-radius:14px;padding:9px;margin-bottom:9px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;}
  .dayrow .thumb{width:74px;height:64px;border-radius:10px;object-fit:cover;flex:0 0 auto;background:#dfe6e6;}
  .dayrow .meta{min-width:0;flex:1;}
  .dayrow .dnum{font-size:11px;color:var(--terra);font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
  .dayrow h3{margin:1px 0 3px;font-size:15.5px;color:var(--teal);line-height:1.15;}
  .dayrow .chips{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{font-size:10.5px;font-weight:700;color:#fff;border-radius:6px;padding:2px 7px;letter-spacing:.2px;}
  .dayrow .arrow{margin-left:auto;color:#c4cccd;font-size:20px;flex:0 0 auto;}

  /* ---------- day detail (timeline of events) ---------- */
  .dayhero{position:relative;height:185px;background:#13232a;border-radius:0;overflow:hidden;}
  .dayhero img{width:100%;height:100%;object-fit:cover;display:block;}
  .dayhero .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,22,28,.82),rgba(10,22,28,0) 55%);}
  .dayhero .cap{position:absolute;left:16px;right:16px;bottom:12px;color:#fff;}
  .dayhero .cap .d{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.92;}
  .dayhero .cap h2{margin:2px 0 0;font-size:23px;line-height:1.12;text-shadow:0 1px 6px rgba(0,0,0,.4);}
  .daysum{font-size:13.5px;line-height:1.5;color:var(--ink);padding:13px 16px 4px;}

  .timeline{padding:6px 14px calc(24px + var(--safe-b));position:relative;}
  .event{position:relative;padding-left:30px;padding-bottom:14px;}
  .event::before{content:"";position:absolute;left:9px;top:5px;bottom:-6px;width:2px;background:var(--line);}
  .event:last-child::before{display:none;}
  .event .dot{position:absolute;left:2px;top:3px;width:16px;height:16px;border-radius:50%;border:3px solid #fff;
    box-shadow:0 0 0 1px var(--line);}
  .event .etime{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
  .ecard{background:#fff;border-radius:13px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;}
  .ecard .egal{position:relative;height:170px;background:#13232a;}
  .ecard .egal img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s;pointer-events:none;}
  .ecard .egal img.active{opacity:1;pointer-events:auto;cursor:zoom-in;}
  .egal .gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;
    width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;}
  .egal .gnav.prev{left:7px;} .egal .gnav.next{right:7px;}
  .egal .gdots{position:absolute;bottom:7px;left:0;right:0;display:flex;gap:5px;justify-content:center;pointer-events:none;}
  .egal .gdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);}
  .egal .gdot.active{background:#fff;}
  .egal .gexp{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,.5);color:#fff;border-radius:6px;font-size:11px;padding:3px 7px;cursor:zoom-in;}
  .ebody{padding:11px 13px 12px;}
  .ebody h3{margin:0 0 2px;font-size:15.5px;color:var(--teal);line-height:1.2;display:flex;align-items:center;gap:7px;}
  .ebody h3 .eic{font-size:16px;}
  .ebody .edesc{font-size:13px;line-height:1.45;color:var(--ink);margin:5px 0 0;}
  .erow{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .erow a, .erow .bk{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;border-radius:8px;padding:5px 9px;text-decoration:none;}
  .erow a.map{background:#e9f1f2;color:var(--teal);}
  .erow .bk{background:#fbf3e7;color:#9a5a12;}
  .erow .bk.todo{background:#fdeede;color:#b4540f;}
  .enote{background:#fff7ed;border:1px solid #f3dcc0;color:#7a4a12;border-radius:9px;padding:7px 10px;font-size:12px;line-height:1.4;margin-top:9px;}

  /* ---------- Today ---------- */
  .todaybanner{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;border-radius:15px;padding:16px 17px;margin-bottom:12px;}
  .todaybanner .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;opacity:.85;font-weight:700;}
  .todaybanner h2{margin:4px 0 5px;font-size:24px;}
  .todaybanner p{margin:0;font-size:13px;opacity:.92;line-height:1.45;}
  .todaybanner .big{font-size:40px;font-weight:800;letter-spacing:-1px;margin:2px 0;}

  /* ---------- Map ---------- */
  #map{position:absolute;inset:0;}
  .legend{position:absolute;left:10px;bottom:calc(10px + var(--safe-b));z-index:500;background:rgba(255,255,255,.94);
    border-radius:10px;padding:7px 10px;font-size:11px;color:var(--ink);box-shadow:0 2px 10px rgba(0,0,0,.2);}
  .legend .lg{display:inline-block;width:18px;height:0;vertical-align:middle;margin-right:4px;}
  .legend .lg.car{border-top:3px solid #2E7D32;}
  .legend .lg.bike{border-top:3px dotted #C1660F;}
  .legend .lg.boat{border-top:3px dashed #2C7A8C;}
  .pin{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;width:30px;height:30px;
    border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #fff;cursor:pointer;}
  .pin.base{width:34px;height:34px;background:var(--teal)!important;font-size:17px;}

  /* ---------- Info ---------- */
  .infocard{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:13px 15px;margin-bottom:11px;}
  .infocard h3{margin:0 0 7px;font-size:13px;color:var(--teal);text-transform:uppercase;letter-spacing:.4px;}
  .inforow{display:flex;gap:9px;padding:6px 0;font-size:13px;line-height:1.45;border-top:1px solid #f3eee2;}
  .inforow:first-of-type{border-top:none;}
  .inforow .ii{flex:0 0 auto;font-size:15px;}
  .inforow b{color:var(--teal);}
  .inforow .todo{color:var(--terra);font-weight:600;}
  .inforow a{color:var(--teal);font-weight:600;}
  .tiny{font-size:11.5px;color:var(--muted);text-align:center;margin:6px 0 2px;line-height:1.6;}
  .tiny a{color:var(--muted);}

  /* ---------- lightbox ---------- */
  .lightbox{position:fixed;inset:0;z-index:1400;background:rgba(8,12,15,.94);display:flex;flex-direction:column;
    align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .lightbox.show{opacity:1;pointer-events:auto;}
  .lb-img{max-width:94vw;max-height:78vh;object-fit:contain;border-radius:8px;box-shadow:0 12px 50px rgba(0,0,0,.6);}
  .lb-cap{color:#fff;margin-top:14px;font-size:15px;text-align:center;max-width:92vw;padding:0 14px;line-height:1.35;}
  .lb-cap .lb-count{display:block;font-size:12px;color:rgba(255,255,255,.55);margin-top:5px;letter-spacing:.5px;}
  .lb-x{position:absolute;top:calc(14px + var(--safe-t));right:16px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:none;
    background:rgba(255,255,255,.15);color:#fff;font-size:26px;cursor:pointer;}
  .lb-nav.prev{left:8px;} .lb-nav.next{right:8px;}
</style>
</head>

/* ===== all photos (for whole-trip lightbox) ===== */
const ALL_PHOTOS=[];
DAYS.forEach(d=>d.events.forEach(e=>(e.photos||[]).forEach(src=>ALL_PHOTOS.push({src, n:d.n}))));

/* ===== view + tab state ===== */
let curTab='itinerary', openDayIdx=null;
function showTab(tab){
  curTab=tab;
  document.querySelectorAll('#views .view').forEach(v=>v.classList.toggle('active', v.id==='view-'+tab));
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  const tb=document.getElementById('topbar');
  // back button only in itinerary detail
  tb.classList.toggle('has-back', tab==='itinerary' && openDayIdx!==null);
  if(tab==='today') renderToday();
  if(tab==='itinerary') openDayIdx===null ? renderDayList() : renderDayDetail('itin-body', openDayIdx);
  if(tab==='info') renderInfo();
  if(tab==='map'){ setTimeout(()=>{ map.invalidateSize(); },60); }
}
function goBack(){ openDayIdx=null; document.getElementById('topbar').classList.remove('has-back'); renderDayList(); }

/* ===== Itinerary: day list ===== */
function chipsHTML(d){ return `<div class="chips">${d.chips.map(c=>`<span class="chip" style="background:${c[1]}">${c[0]}</span>`).join('')}</div>`; }
function firstPhoto(d){ for(const e of d.events){ if(e.photos&&e.photos.length) return e.photos[0]; } return null; }
function renderDayList(){
  document.getElementById('topbar').classList.remove('has-back');
  document.getElementById('itin-body').classList.add('scrollpad');
  document.getElementById('itin-body').innerHTML =
    `<div class="listhead">The 11 days</div>` +
    DAYS.map((d,i)=>{
      const ph=firstPhoto(d);
      return `<div class="dayrow" onclick="openDay(${i})">
        ${ph?`<img class="thumb" src="${ph}" alt="" onerror="this.style.visibility='hidden'">`:`<div class="thumb"></div>`}
        <div class="meta"><div class="dnum">Day ${d.n} · ${d.date}</div><h3>${d.title}</h3>${chipsHTML(d)}</div>
        <span class="arrow">›</span></div>`;
    }).join('');
}
function openDay(i){ openDayIdx=i; curTab='itinerary'; showTab('itinerary'); document.getElementById('view-itinerary').scrollTop=0; }

/* ===== day detail: event timeline ===== */
function galHTML(photos){
  if(!photos||!photos.length) return '';
  const multi=photos.length>1;
  const imgs=photos.map((src,j)=>`<img class="${j===0?'active':''}" src="${src}" alt="" loading="lazy" onerror="this.remove()" onclick="openLb(this)">`).join('');
  const dots=multi?`<div class="gdots">${photos.map((_,j)=>`<span class="gdot ${j===0?'active':''}"></span>`).join('')}</div>`:'';
  const nav=multi?`<button class="gnav prev" onclick="galShift(this,-1)">‹</button><button class="gnav next" onclick="galShift(this,1)">›</button>`:'';
  return `<div class="egal">${imgs}${nav}<span class="gexp" onclick="openLb(this)">⤢</span>${dots}</div>`;
}
function eventHTML(e){
  const map = e.mapq ? `<a class="map" href="${mapU(e.mapq)}" target="_blank" rel="noopener">📍 ${e.place||'Map'}</a>` : (e.place?`<span class="bk" style="background:#eef3f4;color:#1F4E5F">📍 ${e.place}</span>`:'');
  const book = (e.book||[]).map(b=>`<span class="bk ${/add /i.test(b[1])?'todo':''}">📋 ${b[0]}: ${b[1]}</span>`).join('');
  const note = e.note?`<div class="enote">${e.note}</div>`:'';
  const rows = (map||book)?`<div class="erow">${map}${book}</div>`:'';
  return `<div class="event"><span class="dot" style="background:${CAT[e.cat].c}"></span>
    <div class="etime">${e.time||''}</div>
    <div class="ecard">${galHTML(e.photos)}<div class="ebody">
      <h3><span class="eic">${e.ic}</span>${e.title}</h3>
      ${e.desc?`<div class="edesc">${e.desc}</div>`:''}${rows}${note}
    </div></div></div>`;
}
function renderDayDetail(target, i){
  const d=DAYS[i]; const hero=firstPhoto(d);
  if(target==='itin-body') document.getElementById('itin-body').classList.remove('scrollpad');
  document.getElementById('topbar').classList.toggle('has-back', curTab==='itinerary');
  document.getElementById(target).innerHTML =
    (hero?`<div class="dayhero"><img src="${hero}" alt=""><div class="grad"></div><div class="cap"><div class="d">Day ${d.n} · ${d.date}</div><h2>${d.title}</h2></div></div>`:`<div class="listhead" style="margin-top:4px">Day ${d.n} · ${d.date} — ${d.title}</div>`) +
    `<div class="daysum">${d.summary}</div>` +
    `<div class="timeline">${d.events.map(eventHTML).join('')}</div>`;
}

/* the detail views use a non-padded container, so swap scrollpad off when showing a hero */
function renderDayDetailWrap(){ const b=document.getElementById('itin-body'); b.classList.remove('scrollpad'); renderDayDetail('itin-body', openDayIdx); }

/* ===== gallery shift ===== */
function galShift(btn,dir){ const g=btn.closest('.egal'); const im=[...g.querySelectorAll('img')]; const dt=[...g.querySelectorAll('.gdot')];
  let i=im.findIndex(x=>x.classList.contains('active')); im[i].classList.remove('active'); if(dt[i])dt[i].classList.remove('active');
  i=(i+dir+im.length)%im.length; im[i].classList.add('active'); if(dt[i])dt[i].classList.add('active'); }

/* ===== Today ===== */
function localISO(dt){ const p=n=>String(n).padStart(2,'0'); return dt.getFullYear()+'-'+p(dt.getMonth()+1)+'-'+p(dt.getDate()); }
function renderToday(){
  const today=localISO(new Date());
  const idx=DAYS.findIndex(d=>d.iso===today||d.iso2===today);
  const body=document.getElementById('today-body');
  if(idx>=0){
    body.classList.remove('scrollpad');
    body.innerHTML=`<div style="padding:12px 14px 0"><div class="todaybanner"><div class="lbl">Today · ${DAYS[idx].date.split('·').pop().trim()}</div><h2>${DAYS[idx].title}</h2><p>📍 ${DAYS[idx].place}</p></div></div>`;
    const wrap=document.createElement('div'); body.appendChild(wrap); wrap.id='today-detail';
    // render detail into a sub-container
    const tmp=document.createElement('div'); tmp.id='today-detail-inner'; wrap.appendChild(tmp);
    renderDayDetail('today-detail-inner', idx);
    return;
  }
  body.classList.add('scrollpad');
  const start=new Date('2027-09-10T00:00:00'); const now=new Date();
  const diff=Math.ceil((start-now)/86400000);
  if(diff>0){
    body.innerHTML=`<div class="todaybanner"><div class="lbl">Countdown to Mallorca</div><div class="big">${diff}</div><p>days until you fly out to Mallorca. Tap <b>Itinerary</b> to plan, or <b>Map</b> to see where it all is.</p></div>
      <div class="dayrow" onclick="openDay(0)">${firstPhoto(DAYS[0])?`<img class="thumb" src="${firstPhoto(DAYS[0])}">`:''}<div class="meta"><div class="dnum">First up · Day 1</div><h3>${DAYS[0].title}</h3>${chipsHTML(DAYS[0])}</div><span class="arrow">›</span></div>`;
  } else {
    body.innerHTML=`<div class="todaybanner"><div class="lbl">Mar i Muntanya</div><h2>Hope it was epic ✨</h2><p>The trip's a wrap — flip through <b>Itinerary</b> to relive it.</p></div>`;
  }
}

/* ===== Map ===== */
const mapTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:18});
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Imagery &copy; Esri',maxZoom:18});
const satL=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:18});
const map=L.map('map',{scrollWheelZoom:true,layers:[mapTiles]});
L.control.layers({"🗺️ Map":mapTiles,"🛰️ Satellite":L.layerGroup([sat,satL])},null,{position:'topright'}).addTo(map);
const LINE={car:{color:'#2E7D32',weight:4,opacity:.85},bike:{color:'#C1660F',weight:3.5,opacity:.9,dashArray:'1,8',lineCap:'round'},boat:{color:'#2C7A8C',weight:3,opacity:.85,dashArray:'8,8'}};
L.marker(BASE,{icon:L.divIcon({className:'',html:`<div class="pin base">🏠</div>`,iconSize:[34,34],iconAnchor:[17,17]})}).addTo(map).bindTooltip("Home base · Port de Pollença",{direction:'top'});
DAYS.forEach((d,i)=>{
  if(ROUTES[d.n]){ const r=ROUTES[d.n]; L.polyline(r.pts,LINE[r.mode]).addTo(map).on('click',()=>openDay(i)); }
});
DAYS.forEach((d,i)=>{
  if(d.ll===BASE) return;
  const m=L.marker(d.ll,{icon:L.divIcon({className:'',html:`<div class="pin" data-i="${i}" style="background:${chipColor(d)}">${d.n}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map);
  m.on('click',()=>openDay(i)); m.bindTooltip(`Day ${d.n}: ${d.title}`,{direction:'top'});
});
function chipColor(d){ return d.chips&&d.chips[0]?d.chips[0][1]:'#1F4E5F'; }
map.fitBounds(L.latLngBounds([BASE,...DAYS.map(d=>d.ll)]).pad(0.12));

/* ===== lightbox (whole trip) ===== */
let lbIdx=0;
function activeSrc(el){ const g=el.closest('.egal'); const a=g.querySelector('img.active'); return (a||g.querySelector('img'))?.getAttribute('src'); }
function openLb(el){ const src=activeSrc(el); const gi=ALL_PHOTOS.findIndex(p=>p.src===src); lbIdx=gi<0?0:gi; renderLb(); document.getElementById('lightbox').classList.add('show'); }
function renderLb(){ const it=ALL_PHOTOS[lbIdx]; if(!it)return; document.getElementById('lbImg').src=it.src; const c=CAPS[it.src]||''; document.getElementById('lbCap').innerHTML=`Day ${it.n} · ${c}<span class="lb-count">${lbIdx+1} / ${ALL_PHOTOS.length}</span>`; }
function lbStep(d){ const n=ALL_PHOTOS.length; lbIdx=(lbIdx+d+n)%n; renderLb(); }
function closeLb(){ document.getElementById('lightbox').classList.remove('show'); }
function lbBackdrop(e){ if(e.target.id==='lightbox') closeLb(); }
document.addEventListener('keydown',e=>{ const lb=document.getElementById('lightbox'); if(lb.classList.contains('show')){ if(e.key==='ArrowRight')lbStep(1); else if(e.key==='ArrowLeft')lbStep(-1); else if(e.key==='Escape')closeLb(); } });

/* ===== init ===== */
// detail containers shouldn't have the list padding; handle via CSS classes already (timeline/daysum have their own padding)
document.getElementById('itin-body').classList.remove('scrollpad');
document.getElementById('today-body').classList.remove('scrollpad');
const _today=localISO(new Date());
const _isTrip=DAYS.some(d=>d.iso===_today) || (new Date('2027-09-10')-new Date())>0;
showTab(_isTrip && DAYS.some(d=>d.iso===_today) ? 'today' : 'itinerary');
// ensure itinerary list renders first paint
if(curTab==='itinerary' && openDayIdx===null) renderDayList();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script>
