<style>
  :root{ --teal:#1F4E5F; --teal2:#2C7A8C; --terra:#C1660F; --sea:#2C7A8C; --gold:#C8902F;
    --sand:#FBF6EE; --ink:#243239; --muted:#6b7a80; --hike:#2E7D32; }
  *{box-sizing:border-box;}
  button{-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
  header{background:var(--teal);color:#fff;padding:11px 18px calc(9px + env(safe-area-inset-top,0)) 18px;flex:0 0 auto;}
  header .titlerow{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  header h1{margin:0;font-size:17px;letter-spacing:.3px;display:flex;align-items:center;gap:7px;}
  header h1 .em{font-size:16px;}
  header .opts{font-size:11.5px;color:#cfe0e4;text-decoration:none;white-space:nowrap;}
  header .opts:hover{color:#fff;}
  header p{margin:3px 0 0;font-size:12px;opacity:.85;}
  /* day pills */
  .pills{display:flex;gap:6px;margin-top:9px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none;}
  .pills::-webkit-scrollbar{display:none;}
  .pills button{flex:0 0 auto;background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.28);
    border-radius:999px;padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
  .pills button:hover{background:rgba(255,255,255,.24);}
  .pills button.active{background:#fff;color:var(--teal);border-color:#fff;}

  #main{flex:1 1 auto;min-height:0;position:relative;}
  #map{position:absolute;inset:0;}

  .pin{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;
    width:30px;height:30px;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #fff;
    cursor:pointer;transition:transform .15s, opacity .25s;}
  .pin:hover{transform:scale(1.14);}
  .pin.sel{outline:3px solid #ffce3a;outline-offset:1px;box-shadow:0 2px 10px rgba(0,0,0,.5);}
  .pin.base{width:34px;height:34px;background:var(--teal)!important;font-size:17px;}

  /* day card */
  #daycard{position:absolute;left:16px;bottom:16px;z-index:1000;width:360px;max-width:calc(100% - 32px);
    max-height:calc(100% - 28px);background:#fff;border-radius:15px;overflow:hidden;
    box-shadow:0 16px 44px rgba(0,0,0,.34);display:flex;flex-direction:column;}
  .card-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}

  .gal{position:relative;width:100%;height:220px;background:#13232a;}
  .gal img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s;pointer-events:none;}
  .gal img.active{opacity:1;pointer-events:auto;cursor:zoom-in;}
  .gtype{position:absolute;top:10px;left:10px;z-index:3;background:rgba(0,0,0,.5);color:#fff;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;border-radius:6px;padding:3px 9px;}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.42);color:#fff;border:none;
    width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .gnav.prev{left:8px;} .gnav.next{right:8px;}
  .gexpand{position:absolute;bottom:8px;right:8px;z-index:3;background:rgba(0,0,0,.5);color:#fff;border-radius:7px;
    font-size:12px;padding:4px 8px;cursor:zoom-in;}
  .gdots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:5px;justify-content:center;pointer-events:none;}
  .gdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);}
  .gdot.active{background:#fff;}

  .card-body{padding:14px 17px 6px;}
  .pd{font-size:11px;color:var(--terra);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .card-body h2{margin:3px 0 2px;font-size:20px;color:var(--teal);line-height:1.15;}
  .loc{font-size:12.5px;color:var(--muted);margin-bottom:9px;}
  .summary{font-size:13px;line-height:1.5;color:var(--ink);margin:0 0 4px;}
  .acts{list-style:none;margin:8px 0 2px;padding:0;}
  .acts li{position:relative;padding:7px 0 7px 25px;font-size:13px;line-height:1.45;border-top:1px solid #f0e9dc;}
  .acts li:first-child{border-top:none;}
  .acts li .ic{position:absolute;left:0;top:6px;font-size:13.5px;}

  details.det{margin:10px 0 2px;border-top:1px solid #ece2d2;}
  details.det>summary{list-style:none;cursor:pointer;padding:10px 0 4px;font-size:12px;font-weight:700;
    color:var(--teal);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px;}
  details.det>summary::-webkit-details-marker{display:none;}
  details.det>summary .chev{margin-left:auto;transition:transform .2s;font-size:11px;color:var(--muted);}
  details.det[open]>summary .chev{transform:rotate(180deg);}
  .det-row{display:flex;gap:9px;padding:7px 0;font-size:12.5px;line-height:1.45;border-top:1px solid #f4eee2;}
  .det-row:first-of-type{border-top:none;}
  .det-row .di{flex:0 0 auto;font-size:15px;}
  .det-row b{color:var(--teal);}
  .det-row .todo{color:var(--terra);font-weight:600;}
  .maplinks{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px;}
  .maplinks a{display:inline-flex;align-items:center;gap:4px;background:#eef3f4;color:var(--teal);text-decoration:none;
    font-size:12px;font-weight:600;border-radius:7px;padding:5px 10px;}
  .maplinks a:hover{background:#e2ebec;}
  .note{background:#fff7ed;border:1px solid #f3dcc0;color:#7a4a12;border-radius:9px;padding:8px 11px;font-size:12px;line-height:1.45;margin-top:8px;}

  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 13px calc(10px + env(safe-area-inset-bottom,0));
    border-top:1px solid #ece2d2;background:#fbf8f2;flex:0 0 auto;}
  .navbtn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .navbtn:hover{background:#163b48;}
  .navbtn:disabled{background:#cdd6d9;cursor:default;}
  .foot-count{font-size:12.5px;color:var(--muted);font-weight:700;}

  /* install hint */
  .a2hs{position:absolute;left:12px;right:12px;top:8px;z-index:1100;background:rgba(31,78,95,.96);color:#fff;
    border-radius:11px;padding:9px 12px;font-size:12.5px;line-height:1.4;display:flex;align-items:center;gap:9px;
    box-shadow:0 6px 20px rgba(0,0,0,.28);}
  .a2hs button{margin-left:auto;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;}

  /* lightbox */
  .lightbox{position:fixed;inset:0;z-index:1400;background:rgba(8,12,15,.93);display:flex;flex-direction:column;
    align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .lightbox.show{opacity:1;pointer-events:auto;}
  .lb-img{max-width:92vw;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 12px 50px rgba(0,0,0,.6);}
  .lb-cap{color:#fff;margin-top:15px;font-size:15.5px;text-align:center;max-width:90vw;padding:0 14px;line-height:1.35;}
  .lb-cap .lb-count{display:block;font-size:12px;color:rgba(255,255,255,.55);margin-top:5px;letter-spacing:.5px;}
  .lb-x{position:absolute;top:16px;right:18px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;border:none;
    background:rgba(255,255,255,.15);color:#fff;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .lb-nav.prev{left:16px;} .lb-nav.next{right:16px;}

  @media(max-width:720px){
    header h1{font-size:16px;}
    #daycard{left:8px;right:8px;bottom:8px;width:auto;max-width:none;max-height:82%;}
    .gal{height:200px;}
    .lb-img{max-height:72vh;} .lb-nav{width:46px;height:46px;font-size:25px;} .lb-nav.prev{left:8px;} .lb-nav.next{right:8px;}
  }
</style>
</head>

  { n:10, date:"Tue · Sep 21", title:"Flex day — Sóller & the train", place:"Sóller (or your pick)", ll:[39.7667,2.7150], type:"flex",
    summary:"A flexible last full day. Suggested: drive the scenic MA-10 to Sóller for the vintage wooden train and seaside tram, with Deià and Valldemossa on the way. Or repeat a favorite cove, or a second easy e-bike. Last big dinner.",
    photos:["photos/100-mal-d4-train.jpg","photos/101-mal-d4-port-soller.jpg","photos/98-mal-d3-deia.jpg"],
    plan:[["🚋","Sóller — the 1912 wooden train & seaside tram (Deià + Valldemossa en route)"],["🚲","Or: a relaxed second e-bike (bay loop to Alcúdia / wine country)"],
          ["🏊","Or: back to your favorite cove for one more swim"],["🥂","Last big dinner in Port de Pollença"]],
    stay:"Port de Pollença",
    book:[],
    maps:[["Sóller train station","Estacio Soller"],["Valldemossa","Valldemossa Mallorca"]] },

  { n:11, date:"Wed · Sep 22", title:"Fly home", place:"Palma → Eugene", ll:[39.5517,2.7388], type:"travel",
    summary:"Return the car at Palma and fly home to Eugene (2 connections, ~20 hrs). Build in buffer for the drive south and the airport.",
    photos:["photos/118-mal-d10-coast.jpg","photos/119-mal-d10-skyline.jpg","photos/120-mal-d10-airplane.jpg"],
    plan:[["🚗","Drive ~1 hr to Palma; return the rental car (allow buffer)"],["✈️","Fly Palma (PMI) → Eugene — 2 connections"],
          ["🛋️","Recovery days at home before work"],["🎉","Trip complete"]],
    stay:"—",
    book:[["Return flight","PMI → EUG. Add confirmation + departure time"],["Car drop-off","Palma airport. Allow buffer"]],
    maps:[["Palma Airport (PMI)","Palma de Mallorca Airport"]] },
];

/* ---------- helpers ---------- */
function mapUrl(q){ return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q); }

/* ---------- map ---------- */
const mapTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:18});
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Imagery &copy; Esri', maxZoom:18});
const satLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:18});
const map = L.map('map',{scrollWheelZoom:true, layers:[mapTiles]});
L.control.layers({"🗺️ Map":mapTiles,"🛰️ Satellite":L.layerGroup([sat,satLabels])},null,{position:'topright'}).addTo(map);

const markers = [];
// base marker
L.marker(BASE,{icon:L.divIcon({className:'',html:`<div class="pin base">🏠</div>`,iconSize:[34,34],iconAnchor:[17,17]})})
  .addTo(map).bindTooltip("Home base · Port de Pollença",{direction:'top'});
// day markers (skip duplicates that sit exactly on base)
DAYS.forEach((d,i)=>{
  if(d.ll===BASE) return;
  const col=TYPE[d.type].c;
  const m=L.marker(d.ll,{icon:L.divIcon({className:'',html:`<div class="pin" data-i="${i}" style="background:${col}">${d.n}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map);
  m.on('click',()=>openDay(i));
  markers[i]=m;
});

/* ---------- day card ---------- */
let current=0, curImgs=[], lbIdx=0;
const card=document.getElementById('daycard');

function pills(){
  document.getElementById('pills').innerHTML = DAYS.map((d,i)=>`<button data-i="${i}" onclick="openDay(${i})">Day ${d.n}</button>`).join('');
}
function galleryHTML(d){
  const imgs=d.photos||[];
  const t=TYPE[d.type];
  const imgEls=imgs.map((src,j)=>`<img class="${j===0?'active':''}" src="${src}" alt="" loading="lazy" onerror="this.remove()" onclick="openLightbox()">`).join('');
  const multi=imgs.length>1;
  const dots=multi?`<div class="gdots">${imgs.map((_,j)=>`<span class="gdot ${j===0?'active':''}"></span>`).join('')}</div>`:'';
  const nav=multi?`<button class="gnav prev" onclick="galShift(this,-1)">‹</button><button class="gnav next" onclick="galShift(this,1)">›</button>`:'';
  return `<div class="gal"><span class="gtype" style="background:${t.c}">${t.label}</span>${imgEls}${nav}<span class="gexpand" onclick="openLightbox()">⤢ Enlarge</span>${dots}</div>`;
}
function galShift(btn,dir){
  const gal=btn.closest('.gal'); const imgs=[...gal.querySelectorAll('img')]; const dots=[...gal.querySelectorAll('.gdot')];
  let i=imgs.findIndex(x=>x.classList.contains('active')); imgs[i].classList.remove('active'); if(dots[i])dots[i].classList.remove('active');
  i=(i+dir+imgs.length)%imgs.length; imgs[i].classList.add('active'); if(dots[i])dots[i].classList.add('active');
}
function detailsHTML(d){
  const stay = d.stay && d.stay!=='—' ? `<div class="det-row"><span class="di">🛏️</span><div><b>Stay:</b> ${d.stay}</div></div>` : '';
  const book = (d.book||[]).map(b=>`<div class="det-row"><span class="di">📋</span><div><b>${b[0]}:</b> <span class="${/add |confirmation|booking/i.test(b[1])?'todo':''}">${b[1]}</span></div></div>`).join('');
  const maps = (d.maps&&d.maps.length)?`<div class="det-row"><span class="di">📍</span><div><b>Get there:</b><div class="maplinks">${d.maps.map(m=>`<a href="${mapUrl(m[1])}" target="_blank" rel="noopener">📍 ${m[0]}</a>`).join('')}</div></div></div>`:'';
  const note = d.note?`<div class="note">${d.note}</div>`:'';
  return `<details class="det" open><summary>Details & bookings <span class="chev">▾</span></summary>${stay}${book}${maps}</details>${note}`;
}
function openDay(i){
  current=i; const d=DAYS[i]; curImgs=d.photos||[];
  document.getElementById('cardGal').innerHTML=galleryHTML(d);
  document.getElementById('cardBody').innerHTML=
    `<div class="pd">Day ${d.n} · ${d.date}</div>`+
    `<h2>${d.title}</h2><div class="loc">📍 ${d.place}</div>`+
    `<p class="summary">${d.summary}</p>`+
    `<ul class="acts">${d.plan.map(a=>`<li><span class="ic">${a[0]}</span>${a[1]}</li>`).join('')}</ul>`+
    detailsHTML(d);
  document.getElementById('footCount').textContent=`Day ${d.n} of ${DAYS.length}`;
  document.getElementById('prevBtn').disabled=(i===0);
  document.getElementById('nextBtn').disabled=(i===DAYS.length-1);
  document.querySelector('.card-scroll').scrollTop=0;
  document.querySelectorAll('#pills button').forEach(b=>b.classList.toggle('active',+b.dataset.i===i));
  document.querySelectorAll('.pin[data-i]').forEach(p=>p.classList.toggle('sel',+p.dataset.i===i));
  map.flyTo(d.ll, d.type==='travel'?10:12, {duration:.7});
}
function step(dir){ const n=current+dir; if(n>=0&&n<DAYS.length) openDay(n); }

/* ---------- lightbox ---------- */
function activeGalIndex(){ const imgs=[...document.querySelectorAll('#cardGal img')]; const i=imgs.findIndex(x=>x.classList.contains('active')); return i<0?0:i; }
function renderLb(){ const src=curImgs[lbIdx]; document.getElementById('lbImg').src=src; const cap=CAPTIONS[src]||''; const ctx=curImgs.length>1?`${lbIdx+1} / ${curImgs.length}`:''; document.getElementById('lbCap').innerHTML=`${cap}<span class="lb-count">${ctx}</span>`; }
function openLightbox(){ if(!curImgs.length)return; lbIdx=activeGalIndex(); renderLb(); document.getElementById('lightbox').classList.add('show'); }
function lbStep(d){ lbIdx=(lbIdx+d+curImgs.length)%curImgs.length; renderLb(); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }
function lbBackdrop(e){ if(e.target.id==='lightbox') closeLightbox(); }

document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lightbox');
  if(lb.classList.contains('show')){ if(e.key==='ArrowRight')lbStep(1); else if(e.key==='ArrowLeft')lbStep(-1); else if(e.key==='Escape')closeLightbox(); return; }
  if(e.key==='ArrowRight')step(1); else if(e.key==='ArrowLeft')step(-1);
});

/* ---------- add-to-home-screen hint (iOS Safari, not already installed) ---------- */
function dismissA2HS(){ document.getElementById('a2hs').style.display='none'; try{localStorage.setItem('a2hs','1');}catch(e){} }
(function(){
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  let seen=false; try{seen=localStorage.getItem('a2hs')==='1';}catch(e){}
  if(isiOS && !standalone && !seen){ document.getElementById('a2hs').style.display='flex'; }
})();

/* ---------- init ---------- */
pills();
map.fitBounds(L.latLngBounds([BASE,...DAYS.map(d=>d.ll)]).pad(0.12));
openDay(0);
setTimeout(()=>{ map.invalidateSize(); map.fitBounds(L.latLngBounds([BASE,...DAYS.map(d=>d.ll)]).pad(0.12)); }, 240);

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script>
</body>
